<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 20px;
            color: #2c3e50;
            font-weight: bold;
        }
        .code {
            font-size: 28px;
            color: #e74c3c;
            font-weight: bold;
            margin: 20px 0;
        }
        .footer {
            font-size: 12px;
            color: #888;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">欢迎注册 [[${webName}]]</div>
    <p>您正在进行邮箱验证，验证码如下：</p>
    <div class="code">[[${code}]]</div>
    <p>该验证码将在 [[${expire}]] 分钟后失效，请尽快完成验证。</p>
    <p>如果不是您本人操作，请忽略此邮件。</p>
    <div class="footer">
        本邮件由系统自动发送，请勿回复。如有问题请联系 3306019801@qq.com
    </div>
</div>
</body>
</html>
