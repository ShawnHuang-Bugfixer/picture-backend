# Pixabay API
pixabay:
  apiKey: REDACTED_PIXABAY_KEY

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: REDACTED_RABBITMQ_PASSWORD
    virtual-host: /
    template:
      exchange: x.message.direct
    listener:
      simple:
        concurrency: 2
        max-concurrency: 3
        prefetch: 1
        acknowledge-mode: auto
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/picture
    username: root
    password: REDACTED_DB_PASSWORD
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    password: REDACTED_REDIS_PASSWORD
