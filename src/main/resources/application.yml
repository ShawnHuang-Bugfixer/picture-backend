server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
spring:
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  application:
    name: picture-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/picture
    username: root
    password: REDACTED_KNIFE4J_PASSWORD
  # 开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 10MB
  profiles:
    active: local
  redis:
    host: 192.168.200.100
    port: 6379
    database: 0
    timeout: 3000ms

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
#    # 开发环境下开启日志
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

# swagger增强knife4j
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.xin.picturebackend.controller

