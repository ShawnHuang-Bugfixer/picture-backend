# 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: https://resourses.collabimage.afishingcat.xin
    secretId: REDACTED_SECRET_ID
    secretKey: REDACTED_SECRET_KEY
    region: ap-chengdu
    bucket: huang-picture-1345225028

# aLiYun AI
aliYunAi:
  apiKey: REDACTED_ALIYUN_KEY

# pixabay API
pixabay:
  apiKey: REDACTED_PIXABAY_KEY

spring:
  rabbitmq:
    host: 192.168.200.100       # RabbitMQ 主机地址
    port: 5672                # 默认端口
    username: admin           # 登录用户名（建议换成自己的）
    password: REDACTED_RMQ_DEV_PASSWORD          # 登录密码
    virtual-host: /           # 虚拟主机（可按需自定义）
    template:
      exchange: x.message.direct
    listener:
      simple:
        concurrency: 2        # 最小并发消费者数
        max-concurrency: 3   # 最大并发消费者数
        prefetch: 1           # 每次只拉取一个消息
        acknowledge-mode: auto
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/picture
    username: root
    password: REDACTED_KNIFE4J_PASSWORD
  redis:
    host: 192.168.200.100
    port: 6379
    database: 0
    timeout: 3000ms

